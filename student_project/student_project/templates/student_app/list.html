{% extends "base.html" %}
{% block content %}
    <h1 style="color: #333; text-align: center; margin-top: 20px;">Student List</h1>

    <table border="1" cellpadding="10" >
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Age</th>
            <th>Phone</th>
            <th>Edit</th>
        </tr>
    {% for i in students %}
        <tr>
            
            <td>{{i.name}}</td>
            <td>{{i.email}}</td>
            <td>{{i.age}}</td>
            <td>{{i.phone}}</td>
            <td>
                
                <a href="/update/{{i.id}}/">Update</a>
                <a href="/delete/{{i.id}}/" onclick="return confirm('Do you want to delete this student?')">Delete</a>
            </td>
        </tr>
    {% endfor %}
    </table>

{% endblock  %}
